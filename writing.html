<ul class="post-list">
  {% for post in site.posts %}
  <li class="post-list-item">
    <time class="post-list-date" datetime="{{ post.date | date_to_xmlschema }}">
      {{ post.date | date: "%Y-%m-%d" }}
    </time>
    <a class="post-list-title" href="{{ post.url | relative_url }}">{{ post.title }}</a>
  </li>
  {% endfor %}
</ul>
