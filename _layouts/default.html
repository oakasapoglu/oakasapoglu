<script>
  // const themes = ['light', 'dark', 'dracula', 'monokai', 'tokyo-night', 'henna', 'oceanic', 'molokai'];
  // const icons  = ['☀️', '🌙', '🧛', '🎨', '🌃', '🌿', '🌊', '🖤'];

const themes = [
  'light',
  'dark',
  'dracula',
  'monokai',
  'tokyo-night',
  'henna',
  'oceanic',
  'molokai',
  'doom-lantern',
  'doom-outrun-electric',
  'doom-bluloco-light',
  'doom-pine',
  'doom-snazzy',
  'doom-horizon',
  'doom-peacock',
  'doom-laserwave',
  'doom-oceanic-next',
  'doom-challenger-deep'
];

const icons = ['☀️','🌙','🧛','🎨','🌃','🌿','🌊','🖤','🏮','⚡','💙','🌲','✨','🌅','🦚','🌈','🐚','🌌'];




  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    const idx = (themes.indexOf(current) + 1) % themes.length;
    setTheme(idx);
  }

  function setTheme(idx) {
    document.documentElement.setAttribute('data-theme', themes[idx]);
    localStorage.setItem('theme', themes[idx]);
    document.getElementById('theme-toggle').textContent = icons[idx];
  }

  const saved = localStorage.getItem('theme') || 'light';
  const savedIdx = themes.indexOf(saved);
  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', () => setTheme(savedIdx));
</script>



<body>
  <header class="site-header">
    <nav class="nav">
      <a class="nav-logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <ul class="nav-links">
        
        <li><button id="theme-toggle" onclick="toggleTheme()">☀️</button></li>
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/writing/' | relative_url }}">Writing</a></li>
        <li><a href="{{ '/about/' | relative_url }}">About</a></li>
      </ul>
    </nav>
  </header>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>© {{ 'now' | date: "%Y" }} {{ site.author.name }}</span>
      <div class="footer-links">
        {% if site.author.github %}<a href="https://github.com/{{ site.author.github }}">GitHub</a>{% endif %}
        {% if site.author.twitter %}<a href="https://twitter.com/{{ site.author.twitter }}">Twitter</a>{% endif %}
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </div>
  </footer>
</body>
</html>
