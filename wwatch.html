<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my-watch</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f8f8f6;
    --bg2:       #efefec;
    --border:    rgba(0,0,0,0.10);
    --border2:   rgba(0,0,0,0.18);
    --text:      #1a1a18;
    --text2:     #6b6b67;
    --text3:     #adadaa;
    --mono:      'JetBrains Mono', 'Fira Mono', 'Cascadia Code', monospace;
    --green:     #1d9e75;
    --red:       #e24b4a;
    --radius:    8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:      #181816;
      --bg2:     #222220;
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text:    #e8e8e4;
      --text2:   #888884;
      --text3:   #555552;
      --green:   #5dcaa5;
      --red:     #f09595;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 2rem;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .title {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: lowercase;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--text3);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.4s;
    flex-shrink: 0;
  }
  .dot.connected { background: var(--green); }
  .dot.error     { background: var(--red); }

  /* single display mode */
  #single-view {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }

  .sv-expr {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 6px;
  }

  .sv-result {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    word-break: break-all;
    transition: opacity 0.15s;
  }

  .sv-result.flash { opacity: 0.3; }

  .sv-meta {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text3);
    display: flex;
    gap: 1rem;
  }

  /* log mode */
  #log-view {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .log-entry {
    display: grid;
    grid-template-columns: 7rem 1fr;
    gap: 0 1rem;
    padding: 5px 0;
    border-bottom: 0.5px solid var(--border);
    animation: fadein 0.2s ease;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(-3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-ts {
    color: var(--text3);
    font-size: 11px;
    padding-top: 1px;
    white-space: nowrap;
  }

  .log-result {
    color: var(--text);
    word-break: break-all;
  }

  .log-result.is-err { color: var(--red); }

  #empty {
    color: var(--text3);
    font-size: 12px;
    padding: 2rem 0;
    text-align: center;
  }

  #clear-btn {
    background: none;
    border: none;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    margin-top: 1rem;
  }
  #clear-btn:hover { color: var(--text2); }
</style>
</head>
<body>

<header>
  <span class="title">my-watch</span>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">disconnected</span>
  </div>
</header>

<div id="single-view" style="display:none">
  <div class="sv-expr" id="sv-expr"></div>
  <div class="sv-result" id="sv-result">—</div>
  <div class="sv-meta">
    <span id="sv-time"></span>
    <span id="sv-count"></span>
  </div>
</div>

<div id="log-view" style="display:none"></div>
<div id="empty">waiting for Emacs…</div>

<button id="clear-btn" style="display:none" onclick="clearLog()">clear log</button>

<script>
const dot        = document.getElementById('dot');
const statusText = document.getElementById('status-text');
const svView     = document.getElementById('single-view');
const svExpr     = document.getElementById('sv-expr');
const svResult   = document.getElementById('sv-result');
const svTime     = document.getElementById('sv-time');
const svCount    = document.getElementById('sv-count');
const logView    = document.getElementById('log-view');
const empty      = document.getElementById('empty');
const clearBtn   = document.getElementById('clear-btn');

let mode       = null;
let tickCount  = 0;
let ws         = null;

function setStatus(state, msg) {
  statusText.textContent = msg;
  dot.className = 'dot' + (state ? ' ' + state : '');
}

function ts(epoch) {
  return new Date(epoch * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function showSingle(data) {
  if (mode !== 'single') {
    mode = 'single';
    svView.style.display  = 'block';
    logView.style.display = 'none';
    clearBtn.style.display = 'none';
    empty.style.display   = 'none';
  }
  tickCount++;
  svExpr.textContent   = data.expr;
  svCount.textContent  = tickCount + ' updates';
  svTime.textContent   = ts(data.t);
  svResult.classList.add('flash');
  setTimeout(() => {
    svResult.textContent = data.result;
    svResult.classList.remove('flash');
  }, 80);
}

function showLog(data) {
  if (mode !== 'log') {
    mode = 'log';
    svView.style.display  = 'none';
    logView.style.display = 'flex';
    clearBtn.style.display = 'block';
    empty.style.display   = 'none';
  }
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const isErr = data.result && data.result.startsWith('ERROR:');
  entry.innerHTML =
    '<span class="log-ts">' + ts(data.t) + '</span>' +
    '<span class="log-result' + (isErr ? ' is-err' : '') + '">' + esc(data.result) + '</span>';
  logView.prepend(entry);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearLog() {
  logView.innerHTML = '';
  tickCount = 0;
}

function onMessage(raw) {
  let data;
  try { data = JSON.parse(raw); } catch { return; }
  empty.style.display = 'none';
  if (data.display === 'single') showSingle(data);
  else showLog(data);
}

function connect() {
  setStatus('', 'connecting…');
  // ws = new WebSocket('ws://localhost:7070');
  ws = new WebSocket('wss://corporate-barley-footboard.ngrok-free.dev');
  ws.onopen    = () => setStatus('connected', 'connected');
  ws.onclose   = () => { setStatus('error', 'disconnected — retrying'); setTimeout(connect, 3000); };
  ws.onerror   = () => setStatus('error', 'error');
  ws.onmessage = (e) => onMessage(e.data);
}

connect();
</script>
</body>
</html>
