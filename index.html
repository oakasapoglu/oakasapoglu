---
layout: default
title: Home
---
<div class="page-intro">
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>
</div>

<ul class="post-list">
  {% for post in site.posts %}
  <li class="post-list-item">
    <time datetime="{{ post.date | date_to_xmlschema }}">
      {{ post.date | date: "%Y-%m-%d" }}
    </time>
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
  </li>
  {% endfor %}
</ul>
